apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  labels:
    strimzi.io/cluster: my-cluster
  name: my-user
spec:
  authentication:
    type: tls
  authorization:
    acls:
    - host: '*'
      operations:
      - Read
      - Write
      - Describe
      resource:
        name: my-topic
        patternType: literal
        type: topic
      type: allow
    type: simple
