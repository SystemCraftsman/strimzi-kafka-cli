apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  labels:
    strimzi.io/cluster: my-cluster-with-new-name
  name: controller
spec:
  replicas: 3
  roles:
  - controller
  storage:
    type: jbod
    volumes:
    - id: 0
      kraftMetadata: shared
      type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  labels:
    strimzi.io/cluster: my-cluster-with-new-name
  name: broker
spec:
  replicas: 1
  roles:
  - broker
  storage:
    type: jbod
    volumes:
    - id: 0
      kraftMetadata: shared
      type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster-with-new-name
spec:
  entityOperator:
    topicOperator: {}
    userOperator: {}
  kafka:
    config:
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.min.isr: 1
      transaction.state.log.replication.factor: 1
    listeners:
    - name: plain
      port: 9092
      tls: false
      type: internal
    - name: tls
      port: 9093
      tls: true
      type: internal
    metadataVersion: 4.2-IV1
    version: 4.2.0
